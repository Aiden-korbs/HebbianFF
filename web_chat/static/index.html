<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FF/BP Chat Runtime</title>
<style>
:root{color-scheme:dark;--bg:#0f1117;--panel:#171a23;--panel2:#202532;--text:#f2f4f8;--muted:#aeb6c8;--accent:#60a5fa;--border:#303747}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at top,#1d2330,var(--bg));color:var(--text);min-height:100vh;display:flex;justify-content:center}.app{width:min(100%,980px);height:100vh;display:grid;grid-template-rows:auto 1fr auto;padding:14px;gap:12px}header,main,footer{background:rgba(23,26,35,.92);border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}header{padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}h1{font-size:18px;margin:0}.status{font-size:13px;color:var(--muted)}main{overflow-y:auto;padding:14px}.msg{max-width:88%;margin:0 0 12px;padding:12px 14px;border-radius:16px;white-space:pre-wrap;line-height:1.45}.user{margin-left:auto;background:#1d4ed8}.bot{margin-right:auto;background:var(--panel2);border:1px solid var(--border)}.meta{font-size:12px;color:var(--muted);margin-top:8px}footer{padding:12px;display:grid;gap:10px}button,input,textarea{border:1px solid var(--border);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 12px;font:inherit}button{cursor:pointer;background:linear-gradient(180deg,#2563eb,#1d4ed8);border:none;font-weight:700}button.secondary{background:var(--panel2);border:1px solid var(--border)}button:disabled{opacity:.55}.row{display:flex;gap:8px}textarea{width:100%;min-height:62px;resize:vertical}.settings{display:grid;grid-template-columns:repeat(6,minmax(80px,1fr));gap:8px}.settings label{display:grid;gap:4px;color:var(--muted);font-size:12px}.settings input{width:100%;padding:8px}.keybar{display:flex;gap:8px}.keybar input{flex:1}@media(max-width:720px){.settings{grid-template-columns:repeat(2,1fr)}header{align-items:flex-start;flex-direction:column}.msg{max-width:96%}}
</style>
</head>
<body>
<div class="app">
<header><div><h1>FF/BP Chat Runtime</h1><div id="status" class="status">Loading status...</div></div><div><button class="secondary" onclick="resetChat()">Reset</button> <button class="secondary" onclick="checkHealth()">Health</button></div></header>
<main id="chat"></main>
<footer>
<div class="keybar"><input id="shareKey" type="password" placeholder="Share key, if required" /></div>
<div class="settings">
<label>Max new<input id="maxNew" type="number" value="220" min="1" max="768"></label>
<label>Temp<input id="temp" type="number" value="0.4" min="0" max="2" step="0.05"></label>
<label>Top-p<input id="topP" type="number" value="0.9" min="0" max="1" step="0.01"></label>
<label>Top-k<input id="topK" type="number" value="40" min="0" max="200"></label>
<label>Repeat penalty<input id="repeatPenalty" type="number" value="1.15" min="1" max="2" step="0.01"></label>
<label>History turns<input id="maxTurns" type="number" value="6" min="0" max="20"></label>
</div>
<textarea id="message" placeholder="Ask the model something... Ctrl+Enter to send"></textarea>
<div class="row"><button id="sendBtn" onclick="sendMessage()">Send</button></div>
</footer>
</div>
<script>
let sessionId=localStorage.getItem('ffbp_session_id')||null;const chat=document.getElementById('chat'),statusEl=document.getElementById('status'),messageEl=document.getElementById('message'),sendBtn=document.getElementById('sendBtn');function keyHeaders(){const k=document.getElementById('shareKey').value.trim();return k?{'x-share-key':k}:{}}function addMsg(role,text,meta=''){const d=document.createElement('div');d.className='msg '+(role==='user'?'user':'bot');d.textContent=text;if(meta){const m=document.createElement('div');m.className='meta';m.textContent=meta;d.appendChild(m)}chat.appendChild(d);chat.scrollTop=chat.scrollHeight}async function checkHealth(){try{const r=await fetch('/health');const d=await r.json();statusEl.textContent=`Ready · ${d.device} · KV=${d.kv_cache} · ${d.checkpoint}`}catch(e){statusEl.textContent='Health failed: '+e}}async function resetChat(){if(sessionId){await fetch(`/api/reset?session_id=${encodeURIComponent(sessionId)}`,{method:'POST',headers:keyHeaders()}).catch(()=>{})}sessionId=null;localStorage.removeItem('ffbp_session_id');chat.innerHTML='';addMsg('bot','Chat reset.')}async function sendMessage(){const text=messageEl.value.trim();if(!text)return;addMsg('user',text);messageEl.value='';sendBtn.disabled=true;sendBtn.textContent='Generating...';try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json',...keyHeaders()},body:JSON.stringify({session_id:sessionId,message:text,max_new:+document.getElementById('maxNew').value,temp:+document.getElementById('temp').value,top_p:+document.getElementById('topP').value,top_k:+document.getElementById('topK').value,repeat_penalty:+document.getElementById('repeatPenalty').value,max_turns:+document.getElementById('maxTurns').value,history:true})});const d=await r.json();if(!r.ok)throw new Error(d.detail||JSON.stringify(d));sessionId=d.session_id;localStorage.setItem('ffbp_session_id',sessionId);addMsg('bot',d.reply,`elapsed ${d.elapsed_sec}s`)}catch(e){addMsg('bot','Error: '+e.message)}finally{sendBtn.disabled=false;sendBtn.textContent='Send'}}messageEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))sendMessage()});checkHealth();addMsg('bot','Ready. Press Ctrl+Enter to send.');
</script>
</body></html>
